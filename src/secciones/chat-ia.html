<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasplus - Chat IA</title>
    <link rel="stylesheet" href="../css/chat-ia.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <!-- Header del chat -->
        <header class="chat-header">
            <button class="back-btn" onclick="window.history.back()">
                <i class="fa-solid fa-chevron-left"></i>
                <span>Volver atrás</span>
            </button>
            <button class="voice-read-btn" id="voiceReadToggle" aria-label="Activar lectura de IA" title="Activar lectura de IA">
                <i class="fa-solid fa-volume-xmark"></i>
            </button>
        </header>

        <!-- Área de mensajes -->
        <main class="chat-messages" id="chatMessages">
            <!-- Los mensajes aparecerán aquí -->
        </main>

        <!-- Input de mensaje (estado normal) -->
        <div class="chat-input-container" id="chatInputContainer">
            <!-- Estado normal: texto + mic -->
            <div class="chat-input-wrapper" id="normalInputState">
                <input 
                    type="text" 
                    class="chat-input" 
                    id="chatInput"
                    placeholder="Escribe un mensaje..."
                    autocomplete="off"
                >
                <input type="file" accept="image/*" capture id="cameraInput" style="display: none;">
                <button class="camera-btn" id="cameraBtn">
                    <i class="fa-solid fa-camera"></i>
                </button>
                <button class="voice-btn" id="voiceBtn">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <button class="send-btn" id="sendBtn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>

            <!-- Estado grabando: cancelar | ondas + timer | enviar -->
            <div class="recording-input-wrapper" id="recordingInputState">
                <button class="recording-cancel-btn" id="recordingCancelBtn" title="Cancelar grabación">
                    <i class="fa-solid fa-trash"></i>
                </button>
                <div class="recording-panel">
                    <div class="recording-wave-live">
                        <div class="rec-bar"></div>
                        <div class="rec-bar"></div>
                        <div class="rec-bar"></div>
                        <div class="rec-bar"></div>
                        <div class="rec-bar"></div>
                        <div class="rec-bar"></div>
                        <div class="rec-bar"></div>
                        <div class="rec-bar"></div>
                        <div class="rec-bar"></div>
                    </div>
                    <span class="recording-timer" id="recordingTimer">0:00</span>
                </div>
                <button class="recording-send-btn" id="recordingSendBtn" title="Enviar audio">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de opciones de imagen (Cámara o Galería) -->
    <div class="attachment-modal-overlay" id="attachmentModal">
        <div class="attachment-modal">
            <button class="attachment-close-btn" id="attachmentCloseBtn">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <h3 class="attachment-title">Adjuntar imagen</h3>
            <div class="attachment-options">
                <button class="attachment-option-btn" id="btnTomarFoto">
                    <div class="attachment-icon camera"><i class="fa-solid fa-camera"></i></div>
                    <span>Tomar foto</span>
                </button>
                <button class="attachment-option-btn" id="btnElegirGaleria">
                    <div class="attachment-icon gallery"><i class="fa-solid fa-image"></i></div>
                    <span>Elegir de galería</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Cámara WebRTC Integrada -->
    <div class="webrtc-camera-overlay" id="webrtcCameraOverlay">
        <div class="webrtc-header">
            <span>Cámara</span>
            <button class="webrtc-close-btn" id="webrtcCloseBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="webrtc-video-container">
            <video id="webrtcVideo" autoplay playsinline></video>
            <canvas id="webrtcCanvas" style="display: none;"></canvas>
        </div>
        <div class="webrtc-controls">
            <button class="webrtc-capture-btn" id="webrtcCaptureBtn">
                <div class="webrtc-capture-inner"></div>
            </button>
        </div>
    </div>
    
    <script src="../js/modal.js"></script>
    <script src="../js/groq-config.js"></script>
    <script src="../js/mistral-config.js"></script>
    <script src="../js/chat-ia.js"></script>
</body>
</html>
