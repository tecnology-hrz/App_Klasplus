<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasplus - Zonas de Peligro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="../css/mapa-peligro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="mapa-header">
        <button class="back-btn" onclick="history.back()">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <h1 class="mapa-title">Zonas de Peligro - Cali</h1>
        <button class="legend-btn" id="legendBtn">
            <i class="fa-solid fa-circle-info"></i>
        </button>
    </header>

    <!-- Mapa -->
    <div id="map"></div>

    <!-- Panel de zonas internas de la institución -->
    <div class="zonas-panel" id="zonasPanel">
        <div class="zonas-panel-header">
            <h3><i class="fa-solid fa-map-location-dot"></i> Zonas de la Institución</h3>
            <button class="zonas-panel-toggle" id="zonasPanelToggle"><i class="fa-solid fa-chevron-down"></i></button>
        </div>
        <div class="zonas-panel-body" id="zonasPanelBody">
            <div class="zonas-grid" id="zonasGrid">
                <!-- Se genera dinámicamente -->
            </div>
        </div>
    </div>

    <!-- Panel de leyenda -->
    <div class="legend-panel" id="legendPanel">
        <div class="legend-header">
            <span class="legend-title">Leyenda</span>
            <button class="legend-close" id="legendClose"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="legend-item">
            <div class="legend-dot protected"></div>
            <span>En protección activa</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot undiscovered"></div>
            <span>Por descubrir</span>
        </div>
        <div class="legend-item heat-item">
            <div class="heat-gradient"></div>
            <div class="heat-labels">
                <span>Peligroso</span><span>Seguro</span>
            </div>
            <span class="heat-desc">Nivel de peligro por zona</span>
        </div>
    </div>

    <!-- Modal de zona (fotos + info) -->
    <div class="zona-modal-overlay" id="zonaModal" style="display:none;">
        <div class="zona-modal">
            <button class="zona-modal-close" id="zonaModalClose"><i class="fa-solid fa-xmark"></i></button>
            <div class="zona-modal-header" id="zonaModalHeader">
                <i class="fa-solid fa-location-dot"></i>
                <h2 id="zonaModalNombre">Zona</h2>
            </div>
            <div class="zona-modal-score" id="zonaModalScore"></div>
            <div class="zona-modal-fotos" id="zonaModalFotos"></div>
            <div class="zona-modal-recomendaciones" id="zonaModalReco"></div>
        </div>
    </div>

    <!-- Info card al tocar marcador de institución -->
    <div class="info-card" id="infoCard">
        <div class="info-card-header">
            <div class="info-status" id="infoStatus"></div>
            <button class="info-close" id="infoClose"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <h2 class="info-name" id="infoName"></h2>
        <p class="info-address" id="infoAddress"></p>
        <div class="info-stats" id="infoStats"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script type="module">
        import { db, collection, query, where, getDocs, doc, getDoc } from '../js/firebase-config.js';

        // Coordenadas de la institución protegida
        const ESCUELA_LAT = 3.4518;
        const ESCUELA_LNG = -76.5688;

        // Posiciones relativas de zonas dentro de la institución
        const ZONAS_POSICIONES = {
            'baños':       { lat: ESCUELA_LAT + 0.00015, lng: ESCUELA_LNG - 0.00012, icon: 'fa-restroom', defaultScore: 3.5 },
            'escaleras':   { lat: ESCUELA_LAT + 0.00008, lng: ESCUELA_LNG + 0.00015, icon: 'fa-stairs', defaultScore: 4.2 },
            'patio':       { lat: ESCUELA_LAT - 0.00012, lng: ESCUELA_LNG + 0.00005, icon: 'fa-tree', defaultScore: 8.5 },
            'laboratorio': { lat: ESCUELA_LAT + 0.00018, lng: ESCUELA_LNG + 0.00008, icon: 'fa-flask', defaultScore: 2.5 },
            'cafeteria':   { lat: ESCUELA_LAT - 0.00008, lng: ESCUELA_LNG - 0.00018, icon: 'fa-utensils', defaultScore: 6.0 },
            'pasillos':    { lat: ESCUELA_LAT + 0.00005, lng: ESCUELA_LNG - 0.00005, icon: 'fa-road', defaultScore: 7.2 },
            'entrada':     { lat: ESCUELA_LAT - 0.00020, lng: ESCUELA_LNG + 0.00000, icon: 'fa-door-open', defaultScore: 9.0 },
            'canchas':     { lat: ESCUELA_LAT - 0.00015, lng: ESCUELA_LNG + 0.00018, icon: 'fa-futbol', defaultScore: 5.5 },
            'salones':     { lat: ESCUELA_LAT + 0.00010, lng: ESCUELA_LNG - 0.00020, icon: 'fa-chalkboard', defaultScore: 7.0 }
        };

        const ZONAS_NOMBRES = {
            'baños': 'Baños', 'escaleras': 'Escaleras', 'patio': 'Patio Principal',
            'laboratorio': 'Laboratorio', 'cafeteria': 'Cafetería', 'pasillos': 'Pasillos',
            'entrada': 'Entrada Principal', 'canchas': 'Canchas', 'salones': 'Salones'
        };

        // Colores según puntuación de peligro (10 = más seguro, 1 = más peligroso)
        function getColorPeligro(puntuacion) {
            if (puntuacion >= 8) return '#4CAF50';
            if (puntuacion >= 6) return '#FFEB3B';
            if (puntuacion >= 4) return '#FF9800';
            if (puntuacion >= 2) return '#FF5722';
            return '#D32F2F';
        }

        function getLabelPeligro(puntuacion) {
            if (puntuacion >= 8) return 'Seguro';
            if (puntuacion >= 6) return 'Moderado';
            if (puntuacion >= 4) return 'Riesgo Alto';
            if (puntuacion >= 2) return 'Peligroso';
            return 'Crítico';
        }

        // Inicializar mapa
        const map = L.map('map', {
            center: [ESCUELA_LAT, ESCUELA_LNG],
            zoom: 19,
            zoomControl: false,
            maxZoom: 21
        });

        L.tileLayer('https://mt{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            attribution: '&copy; Google Maps',
            subdomains: ['0','1','2','3'],
            maxZoom: 21,
            maxNativeZoom: 20
        }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CartoDB',
            subdomains: 'abcd',
            maxZoom: 21,
            opacity: 0.85
        }).addTo(map);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // Círculo de la institución
        L.circle([ESCUELA_LAT, ESCUELA_LNG], {
            radius: 30,
            color: '#FF5722',
            fillColor: '#FF5722',
            fillOpacity: 0.08,
            weight: 1.5,
            dashArray: '5 4',
            interactive: false
        }).addTo(map);

        // Pin principal de la institución
        const mainIcon = L.divIcon({
            html: '<div class="map-pin pin-protected"><i class="fa-solid fa-shield-halved"></i></div>',
            className: '',
            iconSize: [40, 40],
            iconAnchor: [20, 40]
        });
        L.marker([ESCUELA_LAT, ESCUELA_LNG], { icon: mainIcon }).addTo(map)
            .bindTooltip('Escuela Ana Maria De Lloreda', { permanent: true, direction: 'top', offset: [0, -44], className: 'pin-label' });

        // Cargar zonas desde Firebase
        const institucionId = localStorage.getItem('userInstitution') || 'default';
        let zonasData = {};

        async function cargarZonas() {
            try {
                const zonasRef = collection(db, 'zonas_institucion');
                const q = query(zonasRef, where('institucionId', '==', institucionId));
                const snapshot = await getDocs(q);
                snapshot.forEach(function(docSnap) {
                    const data = docSnap.data();
                    zonasData[data.slug] = data;
                });
            } catch(e) { console.error('Error cargando zonas:', e); }

            renderZonasEnMapa();
            renderZonasPanel();
            renderHeatmap();
        }

        function renderZonasEnMapa() {
            Object.keys(ZONAS_POSICIONES).forEach(function(slug) {
                const pos = ZONAS_POSICIONES[slug];
                const zona = zonasData[slug];
                const puntuacion = zona ? zona.puntuacionPeligro : pos.defaultScore;
                const color = getColorPeligro(puntuacion);

                // Círculo de calor por zona
                L.circle([pos.lat, pos.lng], {
                    radius: 8,
                    color: color,
                    fillColor: color,
                    fillOpacity: 0.4,
                    weight: 2,
                    className: 'zona-heat-circle'
                }).addTo(map);

                // Marcador de zona
                const iconHtml = '<div class="zona-pin" style="background:' + color + ';"><i class="fa-solid ' + pos.icon + '"></i></div>';
                const icon = L.divIcon({
                    html: iconHtml,
                    className: '',
                    iconSize: [28, 28],
                    iconAnchor: [14, 14]
                });

                L.marker([pos.lat, pos.lng], { icon: icon }).addTo(map)
                    .on('click', function() { abrirZonaModal(slug); });
            });
        }

        function renderHeatmap() {
            var heatData = [];
            Object.keys(ZONAS_POSICIONES).forEach(function(slug) {
                var pos = ZONAS_POSICIONES[slug];
                var zona = zonasData[slug];
                var puntuacion = zona ? zona.puntuacionPeligro : pos.defaultScore;
                var intensidad = (10 - puntuacion) / 10; // Invertido: menos puntuación = más calor
                heatData.push([pos.lat, pos.lng, intensidad]);
            });

            L.heatLayer(heatData, {
                radius: 25,
                blur: 20,
                maxZoom: 21,
                max: 1.0,
                gradient: { 0.2: '#4CAF50', 0.4: '#FFEB3B', 0.6: '#FF9800', 0.8: '#FF5722', 1.0: '#D32F2F' }
            }).addTo(map);
        }

        function renderZonasPanel() {
            var grid = document.getElementById('zonasGrid');
            grid.innerHTML = '';
            Object.keys(ZONAS_POSICIONES).forEach(function(slug) {
                var pos = ZONAS_POSICIONES[slug];
                var zona = zonasData[slug];
                var puntuacion = zona ? zona.puntuacionPeligro : pos.defaultScore;
                var color = getColorPeligro(puntuacion);
                var label = getLabelPeligro(puntuacion);
                var totalFotos = zona ? (zona.totalFotos || 0) : 0;

                var item = document.createElement('div');
                item.className = 'zona-panel-item';
                item.onclick = function() { abrirZonaModal(slug); };
                item.innerHTML = '<div class="zona-panel-icon" style="background:' + color + '20;color:' + color + ';"><i class="fa-solid ' + pos.icon + '"></i></div><div class="zona-panel-info"><span class="zona-panel-name">' + ZONAS_NOMBRES[slug] + '</span><span class="zona-panel-score" style="color:' + color + ';">' + puntuacion.toFixed(1) + '/10 - ' + label + '</span></div><div class="zona-panel-fotos-count">' + (totalFotos > 0 ? '<i class="fa-solid fa-camera"></i> ' + totalFotos : '') + '</div>';
                grid.appendChild(item);
            });
        }

        function abrirZonaModal(slug) {
            var zona = zonasData[slug];
            var pos = ZONAS_POSICIONES[slug];
            var puntuacion = zona ? zona.puntuacionPeligro : pos.defaultScore;
            var color = getColorPeligro(puntuacion);
            var label = getLabelPeligro(puntuacion);

            document.getElementById('zonaModalNombre').textContent = ZONAS_NOMBRES[slug];
            var header = document.getElementById('zonaModalHeader');
            header.style.background = color + '22';
            header.style.borderColor = color;
            header.querySelector('i').style.color = color;

            // Score
            document.getElementById('zonaModalScore').innerHTML = '<div class="zona-score-bar-wrap"><div class="zona-score-label"><span>Nivel de peligro</span><span style="color:' + color + ';font-weight:800;">' + puntuacion.toFixed(1) + '/10</span></div><div class="zona-score-bar"><div class="zona-score-fill" style="width:' + (puntuacion * 10) + '%;background:' + color + ';"></div></div><span class="zona-score-status" style="color:' + color + ';">' + label + '</span></div>';

            // Fotos (hasta 3)
            var fotosContainer = document.getElementById('zonaModalFotos');
            fotosContainer.innerHTML = '';
            if (zona && zona.fotos && zona.fotos.length > 0) {
                var fotosToShow = zona.fotos.slice(-3);
                fotosContainer.innerHTML = '<h4><i class="fa-solid fa-camera"></i> Fotos reportadas (' + zona.fotos.length + ')</h4>';
                var fotosGrid = document.createElement('div');
                fotosGrid.className = 'zona-fotos-grid';
                fotosToShow.forEach(function(foto) {
                    var img = document.createElement('img');
                    img.src = foto.url;
                    img.alt = ZONAS_NOMBRES[slug];
                    img.className = 'zona-foto-thumb';
                    fotosGrid.appendChild(img);
                });
                fotosContainer.appendChild(fotosGrid);
            } else {
                fotosContainer.innerHTML = '<div class="zona-sin-fotos"><i class="fa-solid fa-camera-retro"></i><span>Sin fotos reportadas aún</span></div>';
            }

            // Recomendaciones
            var recoContainer = document.getElementById('zonaModalReco');
            if (zona && zona.recomendaciones && zona.recomendaciones.length > 0) {
                var recoHTML = '<h4><i class="fa-solid fa-robot"></i> Recomendaciones IA</h4><ul>';
                zona.recomendaciones.forEach(function(r) { recoHTML += '<li>' + r + '</li>'; });
                recoHTML += '</ul>';
                recoContainer.innerHTML = recoHTML;
            } else {
                recoContainer.innerHTML = '<div class="zona-sin-reco"><i class="fa-solid fa-robot"></i><span>Completa más misiones para obtener recomendaciones de la IA</span></div>';
            }

            document.getElementById('zonaModal').style.display = 'flex';
        }

        // Eventos UI
        document.getElementById('zonaModalClose').addEventListener('click', function() {
            document.getElementById('zonaModal').style.display = 'none';
        });
        document.getElementById('zonaModal').addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });

        document.getElementById('legendBtn').addEventListener('click', function() {
            document.getElementById('legendPanel').classList.toggle('visible');
        });
        document.getElementById('legendClose').addEventListener('click', function() {
            document.getElementById('legendPanel').classList.remove('visible');
        });
        document.getElementById('infoClose').addEventListener('click', function() {
            document.getElementById('infoCard').classList.remove('visible');
        });

        document.getElementById('zonasPanelToggle').addEventListener('click', function() {
            var body = document.getElementById('zonasPanelBody');
            var icon = this.querySelector('i');
            if (body.style.display === 'none') {
                body.style.display = 'block';
                icon.className = 'fa-solid fa-chevron-down';
            } else {
                body.style.display = 'none';
                icon.className = 'fa-solid fa-chevron-up';
            }
        });

        map.on('click', function() {
            document.getElementById('infoCard').classList.remove('visible');
        });

        // Iniciar
        cargarZonas();
    </script>
</body>
</html>
