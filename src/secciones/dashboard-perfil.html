<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasplus - Perfil</title>
    <link rel="stylesheet" href="../css/perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="perfil-container">
        <!-- Header con botón de volver -->
        <header class="perfil-header">
            <button class="back-btn" id="backBtn">
                <i class="fa-solid fa-chevron-left"></i>
                <span>Volver al inicio</span>
            </button>
            <button class="notification-btn" id="notificationBtn">
                <svg class="notification-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 8C18 6.4087 17.3679 4.88258 16.2426 3.75736C15.1174 2.63214 13.5913 2 12 2C10.4087 2 8.88258 2.63214 7.75736 3.75736C6.63214 4.88258 6 6.4087 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </header>

        <!-- Contenido principal del perfil -->
        <main class="perfil-content">
            <!-- Foto de perfil y nombre -->
            <div class="profile-photo-section">
                <div class="profile-photo-wrapper">
                    <img id="profilePhoto" class="profile-photo" src="" alt="Foto de perfil" style="display: none;">
                    <div id="profilePhotoPlaceholder" class="profile-photo-placeholder">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>
                <h2 class="profile-name" id="profileName">Juan Camilo Herrera</h2>
            </div>

            <!-- Opciones del perfil -->
            <div class="profile-options">
                <button class="profile-option" id="editarPerfilBtn">
                    <div class="option-icon edit">
                        <i class="fa-solid fa-pen"></i>
                    </div>
                    <span class="option-text">Editar Perfil</span>
                    <i class="fa-solid fa-chevron-right option-arrow"></i>
                </button>

                <button class="profile-option" id="estadisticasBtn">
                    <div class="option-icon stats">
                        <i class="fa-solid fa-chart-simple"></i>
                    </div>
                    <span class="option-text">Estadísticas</span>
                    <i class="fa-solid fa-chevron-right option-arrow"></i>
                </button>

                <button class="profile-option" id="notificacionesBtn">
                    <div class="option-icon notifications">
                        <i class="fa-solid fa-bell"></i>
                    </div>
                    <span class="option-text">Notificaciones</span>
                    <span class="notification-count">5</span>
                    <i class="fa-solid fa-chevron-right option-arrow"></i>
                </button>

                <button class="profile-option" id="configuracionBtn">
                    <div class="option-icon config">
                        <i class="fa-solid fa-gear"></i>
                    </div>
                    <span class="option-text">Configuración</span>
                    <i class="fa-solid fa-chevron-right option-arrow"></i>
                </button>

                <button class="profile-option logout" id="cerrarSesionBtn">
                    <div class="option-icon logout-icon">
                        <i class="fa-solid fa-power-off"></i>
                    </div>
                    <span class="option-text">Cerrar Sesión</span>
                    <i class="fa-solid fa-chevron-right option-arrow"></i>
                </button>
            </div>
        </main>

        <!-- Barra de navegación inferior -->
        <nav class="bottom-nav">
            <button class="nav-item" data-section="inicio">
                <i class="fa-solid fa-house nav-icon"></i>
                <span class="nav-label">Inicio</span>
            </button>

            <button class="nav-item" data-section="brigada">
                <i class="fa-solid fa-user-group nav-icon"></i>
                <span class="nav-label">Brigada</span>
            </button>

            <button class="nav-item emergency" data-section="emergencia">
                <i class="fa-solid fa-phone-volume nav-icon-emergency"></i>
            </button>

            <button class="nav-item" data-section="ia">
                <i class="fa-solid fa-comment-dots nav-icon"></i>
                <span class="nav-label">IA</span>
            </button>

            <button class="nav-item active" data-section="perfil">
                <i class="fa-solid fa-user nav-icon"></i>
                <span class="nav-label">Perfil</span>
            </button>
        </nav>
    </div>

    <script src="../js/perfil.js"></script>
</body>
</html>
