<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasplus - Brigada</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="user-profile">
                <img id="userAvatar" class="user-avatar" src="" alt="Avatar" style="display: none;">
                <div id="userAvatarPlaceholder" class="user-avatar-placeholder">U</div>
                <h2 class="user-name" id="userName">Usuario</h2>
            </div>
            
            <div class="header-actions">
                <button class="notification-btn" id="notificationBtn">
                    <svg class="notification-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 8C18 6.4087 17.3679 4.88258 16.2426 3.75736C15.1174 2.63214 13.5913 2 12 2C10.4087 2 8.88258 2.63214 7.75736 3.75736C6.63214 4.88258 6 6.4087 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                
                <button id="logoutBtn" class="logout-btn">
                    <svg class="logout-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 17L21 12L16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Cerrar Sesión</span>
                </button>
            </div>
        </header>

        <main class="dashboard-content">
            <h1>Brigada de Seguridad</h1>
            <p>Información sobre las brigadas de seguridad escolar</p>
        </main>

        <!-- Barra de navegación inferior -->
        <nav class="bottom-nav">
            <button class="nav-item" data-section="inicio">
                <i class="fa-solid fa-house nav-icon"></i>
                <span class="nav-label">Inicio</span>
            </button>

            <button class="nav-item active" data-section="brigada">
                <i class="fa-solid fa-user-group nav-icon"></i>
                <span class="nav-label">Brigada</span>
            </button>

            <button class="nav-item emergency" data-section="emergencia">
                <i class="fa-solid fa-phone-volume nav-icon-emergency"></i>
            </button>

            <button class="nav-item" data-section="ia">
                <i class="fa-solid fa-comment-dots nav-icon"></i>
                <span class="nav-label">IA</span>
            </button>

            <button class="nav-item" data-section="perfil">
                <i class="fa-solid fa-user nav-icon"></i>
                <span class="nav-label">Perfil</span>
            </button>
        </nav>
    </div>

    <script src="../js/modal.js"></script>
    <script src="../js/dashboard-brigada.js"></script>
</body>
</html>
