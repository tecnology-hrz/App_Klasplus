<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasplus - Registro</title>
    <link rel="stylesheet" href="../css/registro.css">
</head>
<body>
    <div class="registro-container">
        <!-- Logo -->
        <div class="logo-container">
            <img src="../img/Klasplus-blanco_logo.webp" alt="Klasplus - Escuelas Seguras">
        </div>

        <!-- Tarjeta de Registro -->
        <div class="registro-card">
            <h1 class="title-text">Regístrate en Klasplus</h1>

            <!-- Formulario -->
            <form id="registroForm">
                <h2 class="section-title">Información Personal</h2>
                
                <div class="input-row">
                    <div class="input-group half">
                        <input type="text" class="input-field" id="nombres" placeholder="Nombres" required>
                    </div>
                    <div class="input-group half">
                        <input type="text" class="input-field" id="apellidos" placeholder="Apellidos" required>
                    </div>
                </div>

                <div class="input-group">
                    <input type="tel" class="input-field" id="telefono" placeholder="Teléfono/WhatsApp" required>
                </div>

                <div class="input-group">
                    <select class="input-field select-field" id="tipoDocumento" required>
                        <option value="">Selecciona tu tipo de documento</option>
                        <option value="cedula_ciudadania">Cédula de ciudadanía</option>
                        <option value="cedula_extranjeria">Cédula de extranjería</option>
                        <option value="tarjeta_identidad">Tarjeta de identidad</option>
                        <option value="cedula_identidad">Cédula de identidad</option>
                        <option value="pasaporte">Pasaporte</option>
                        <option value="pep">PEP</option>
                    </select>
                </div>

                <div class="input-group">
                    <input type="text" class="input-field" id="numeroDocumento" placeholder="Número de documento" required>
                </div>

                <div class="input-group">
                    <select class="input-field select-field" id="sexo" required>
                        <option value="">Selecciona tu sexo</option>
                        <option value="masculino">Masculino</option>
                        <option value="femenino">Femenino</option>
                        <option value="sin_especificar">Sin Especificar</option>
                    </select>
                </div>

                <div class="input-group">
                    <select class="input-field select-field" id="jornada" required>
                        <option value="">Selecciona tu jornada</option>
                        <option value="manana">Mañana</option>
                        <option value="tarde">Tarde</option>
                    </select>
                </div>

                <div class="input-group">
                    <select class="input-field select-field" id="institucion" required>
                        <option value="">Selecciona tu institución</option>
                        <!-- Las instituciones se cargarán dinámicamente desde Firebase -->
                    </select>
                </div>

                <h2 class="section-title">Información de Seguridad</h2>

                <div class="input-group">
                    <input type="email" class="input-field" id="email" placeholder="Correo Electrónico" required>
                </div>

                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="password" class="input-field" id="password" placeholder="Contraseña" required>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <svg class="eye-icon" id="eyeIcon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="#9FA8DA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <circle cx="12" cy="12" r="3" stroke="#9FA8DA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <svg class="eye-icon hidden" id="eyeSlashIcon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M17.94 17.94C16.2306 19.243 14.1491 19.9649 12 20C5 20 1 12 1 12C2.24389 9.68192 3.96914 7.65663 6.06 6.06M9.9 4.24C10.5883 4.0789 11.2931 3.99836 12 4C19 4 23 12 23 12C22.393 13.1356 21.6691 14.2048 20.84 15.19M14.12 14.12C13.8454 14.4147 13.5141 14.6512 13.1462 14.8151C12.7782 14.9791 12.3809 15.0673 11.9781 15.0744C11.5753 15.0815 11.1752 15.0074 10.8016 14.8565C10.4281 14.7056 10.0887 14.4811 9.80385 14.1962C9.51897 13.9113 9.29439 13.5719 9.14351 13.1984C8.99262 12.8248 8.91853 12.4247 8.92563 12.0219C8.93274 11.6191 9.02091 11.2218 9.18488 10.8538C9.34884 10.4859 9.58525 10.1546 9.88 9.88" stroke="#9FA8DA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <line x1="1" y1="1" x2="23" y2="23" stroke="#9FA8DA" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="input-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="autorizacion" required>
                        <span class="checkmark"></span>
                        <span class="checkbox-text">Autorizo Expresamente a Klasplus para utilizar mi información personal en trámite de esta petición. <a href="#" class="link-politicas">Políticas de tratamiento de datos personales</a></span>
                    </label>
                </div>

                <button type="submit" class="registro-btn">Crear Cuenta</button>

                <div class="login-link">
                    ¿Ya tienes una cuenta?
                    <a href="login.html">Inicia Sesión</a>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../js/registro.js"></script>
</body>
</html>
