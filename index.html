<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasplus - Cargando...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #E3F2FD;
            border-top: 6px solid #1565C0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #1565C0;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <div class="loading-text">Cargando...</div>
    </div>

    <script>
        // Verificar si hay sesión activa
        const userId = localStorage.getItem('userId');
        const userRole = localStorage.getItem('userRole');
        
        if (userId && userRole) {
            // Si hay sesión, redirigir al dashboard correspondiente
            const roleMap = {
                'estudiante': 'src/secciones/dashboard-estudiante.html',
                'profesor': 'src/secciones/dashboard-profesor.html',
                'admin': 'src/secciones/dashboard-admin.html',
                'coordinador': 'src/secciones/dashboard-coordinador.html',
                'institucion': 'src/secciones/dashboard-institucion.html'
            };
            
            const dashboardPage = roleMap[userRole.toLowerCase()] || 'src/secciones/dashboard-estudiante.html';
            window.location.href = dashboardPage;
        } else {
            // Si no hay sesión, redirigir al login después de 1 segundo
            setTimeout(function() {
                window.location.href = 'src/secciones/login.html';
            }, 1000);
        }
    </script>
</body>
</html>
