<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subir o Tomar Foto</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    input[type="file"] {
      display: none;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
    }

    .btn:active {
      transform: scale(0.97);
    }

    img {
      width: 100%;
      margin-top: 15px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Subir o tomar una foto</h1>

    <!-- Input oculto -->
    <input type="file" id="fileInput" accept="image/*" capture>

    <!-- Botones -->
    <button class="btn" onclick="abrirCamara()">📸 Tomar foto</button>
    <button class="btn" onclick="abrirGaleria()">📂 Elegir de galería</button>

    <!-- Vista previa -->
    <img id="preview" />
  </div>

  <script>
    const input = document.getElementById("fileInput");
    const preview = document.getElementById("preview");

    function abrirCamara() {
      input.setAttribute("capture", "environment"); // cámara trasera
      input.click();
    }

    function abrirGaleria() {
      input.removeAttribute("capture");
      input.click();
    }

    input.addEventListener("change", function () {
      const file = this.files[0];

      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          preview.src = e.target.result;
          preview.style.display = "block";
        };
        reader.readAsDataURL(file);
      }
    });
  </script>

</body>
</html>
